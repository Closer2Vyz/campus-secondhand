<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>校内好物圈</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="toast" class="toast"></div>

  <!-- ===== 首页 ===== -->
  <div id="page-home" class="page active">
    <div class="header">
      <span class="header-title">校内好物圈</span>
      <span class="header-btn" onclick="loadNotice()">📢</span>
    </div>
    <div class="search-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="searchInput" placeholder="搜索好物" />
      </div>
      <span id="searchBtn" style="background:#07c160;color:#fff;border:none;border-radius:20px;padding:0 16px;font-size:14px;cursor:pointer;display:flex;align-items:center;">搜索</span>
    </div>
    <div id="loginNotice"></div>
    <div class="cats" id="cats"></div>
    <div class="sort-bar">
      <span class="sort-btn active" onclick="setSort('time_desc')">最新</span>
      <span class="sort-btn" onclick="setSort('price_asc')">心意↑</span>
      <span class="sort-btn" onclick="setSort('price_desc')">心意↓</span>
    </div>
    <div class="grid" id="itemList"></div>
    <div id="loadMore" style="display:none;text-align:center;padding:16px;color:#999;cursor:pointer;" onclick="loadMore()">加载更多</div>
  </div>

  <!-- ===== 详情 ===== -->
  <div id="page-detail" class="page">
    <div class="header">
      <span class="header-back" onclick="showPage('home')">← 返回</span>
      <span class="header-title">详情</span>
      <span></span>
    </div>
    <div id="detailContent"></div>
    <div id="detailBottom" class="detail-bottom" style="display:none"></div>
  </div>

  <!-- ===== 发布 ===== -->
  <div id="page-publish" class="page">
    <div class="header">
      <span class="header-back" onclick="showPage('home')">← 返回</span>
      <span class="header-title">添加好物</span>
      <span></span>
    </div>
    <div class="card" style="margin-top:4px">
      <div class="form-group">
        <label class="form-label">📝 标题</label>
        <input class="form-input" id="pubTitle" placeholder="输入标题" />
      </div>
      <div class="form-group">
        <label class="form-label">🏷️ 分类</label>
        <select class="form-input form-select" id="pubCat">
          <option value="">请选择</option>
          <option>教材</option><option>数码</option><option>生活</option><option>体育</option><option>其他</option><option>虚拟物品</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">🍞 心意</label>
        <input class="form-input" id="pubPrice" placeholder="0.00" type="number" step="0.01" />
      </div>
      <div class="form-group">
        <label class="form-label">📞 联系方式</label>
        <input class="form-input" id="pubContact" placeholder="微信号或手机号" />
      </div>
      <div class="form-group">
        <label class="form-label">📄 描述</label>
        <textarea class="form-input form-textarea" id="pubDesc" placeholder="描述好物情况"></textarea>
      </div>
      <button class="btn btn-primary" onclick="publish()">添加</button>
    </div>
  </div>

  <!-- ===== 个人中心 ===== -->
  <div id="page-profile" class="page">
    <div class="header">
      <span class="header-title">我的</span>
      <span></span>
    </div>
    <div id="profileContent"></div>
  </div>

  <!-- ===== 底部导航 ===== -->
  <div class="tabbar">
    <div class="tab-item active" onclick="showPage('home')"><span class="tab-icon">🏠</span>首页</div>
    <div class="tab-item" onclick="showPage('publish')"><span class="tab-icon">➕</span>添加</div>
    <div class="tab-item" onclick="showPage('profile')"><span class="tab-icon">👤</span>我的</div>
  </div>

  <!-- ===== 联系弹窗 ===== -->
  <div class="modal" id="contactModal">
    <div class="modal-content">
      <div class="modal-title">📦 联系信息</div>
      <div class="form-group"><label class="form-label">📅 日期</label><input class="form-input" id="conDate" type="date" /></div>
      <div class="form-group"><label class="form-label">⏰ 时间</label><input class="form-input" id="conTime" type="time" /></div>
      <div class="form-group"><label class="form-label">📍 地点</label><input class="form-input" id="conLoc" placeholder="如图书馆、食堂" /></div>
      <div class="form-group"><label class="form-label">📞 手机号</label><input class="form-input" id="conPhone" placeholder="方便对方联系" type="tel" /></div>
      <div style="background:#f8f8f8;border-radius:8px;padding:12px;margin-bottom:16px;">
        <div style="display:flex;justify-content:space-between;font-size:14px;"><span>心意</span><span id="conPrice" style="font-weight:700;"></span></div>
      </div>
      <button class="btn btn-primary" onclick="submitContact()">去联系</button>
      <button class="btn btn-secondary" onclick="modal('contactModal',0)">取消</button>
    </div>
  </div>

  <!-- ===== 公告弹窗 ===== -->
  <div class="modal" id="noticeModal">
    <div class="modal-content">
      <div class="modal-title">📢 公告</div>
      <div id="noticeBody" class="notice-box"></div>
      <button class="btn btn-primary" style="margin-top:16px" onclick="modal('noticeModal',0)">知道了</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
